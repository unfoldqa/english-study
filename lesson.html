<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Урок — English Course</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/course.css?v=9">
</head>
<body>
  <div class="progress-bar-top" id="progressBar"></div>
  <div class="bg-accent"><div class="shape s1"></div><div class="shape s2"></div></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="assets/favicon.svg" alt="" class="logo-icon" width="32" height="32">
        English <span>Course</span>
      </a>
      <div class="wallet-bar" id="walletBar">
        <span class="wallet-item" title="Подсказки">💡 <strong id="hintBalance">5</strong></span>
        <span class="wallet-item" title="Монеты за завершённые модули">🪙 <strong id="coinBalance">0</strong></span>
        <button type="button" class="btn btn-secondary btn-sm" id="buyHintsBtn">+3 подсказки · 10🪙</button>
      </div>
      <div id="walletFeedback" class="wallet-feedback"></div>
      <a href="index.html" class="btn btn-secondary" style="padding:8px 16px;font-size:0.85rem">← К курсу</a>
    </div>
  </header>

  <main class="container" id="lessonRoot"></main>

  <footer class="site-footer">English Course A1 → B2</footer>

  <div class="finish-overlay" id="finishOverlay">
    <div class="finish-modal">
      <div style="font-size:3rem;margin-bottom:12px">✓</div>
      <h2>Урок завершён!</h2>
      <p style="color:var(--text-muted);margin-bottom:20px">Прогресс сохранён в браузере.</p>
      <div class="finish-stats">
        <div class="finish-stat"><div class="val" id="modalQuizScore">—</div><div class="lbl">Тест</div></div>
        <div class="finish-stat"><div class="val" id="modalProgress">—</div><div class="lbl">Курс</div></div>
        <div class="finish-stat"><div class="val" id="modalLevel">—</div><div class="lbl">Уровень</div></div>
        <div class="finish-stat"><div class="val">20</div><div class="lbl">Минут</div></div>
      </div>
      <button class="btn btn-primary btn-close-modal" id="closeModalBtn" style="width:100%">Продолжить</button>
    </div>
  </div>

  <script src="assets/curriculum.js?v=9"></script>
  <script src="assets/course.js?v=9"></script>
  <script>
    const id = getLessonParam();
    const lesson = getLesson(id);
    if (!lesson) {
      document.getElementById('lessonRoot').innerHTML = '<p>Урок не найден. <a href="index.html">Вернуться к курсу</a></p>';
    } else {
      renderLesson(lesson);
    }
  </script>
</body>
</html>
